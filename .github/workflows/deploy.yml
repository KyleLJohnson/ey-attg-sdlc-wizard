name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Configure EY npm registry
        run: |
          echo "@ey-xd:registry=https://eyctpeu.jfrog.io/artifactory/api/npm/ey-npm/" >> .npmrc
          echo "//eyctpeu.jfrog.io/artifactory/api/npm/ey-npm/:_authToken=${{ secrets.NPM_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: npm install

      - name: Bundle sdd-kit files
        run: npm run bundle-kit
        env:
          # Reads from ./sdd-kit/ by default (committed to the repo).
          # Override with KIT_PATH if the kit lives elsewhere.
          KIT_PATH: ${{ vars.KIT_PATH || '' }}

      - name: Build
        run: npm run build
        env:
          # base path is derived automatically from GITHUB_REPOSITORY
          SITE_URL: https://${{ github.repository_owner }}.github.io

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
